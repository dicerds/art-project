<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — ARCHITEKTA</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,400;9..144,500&family=Space+Grotesk:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/styles/main.css">
</head>
<body>
  <div class="cms-login">
    <div class="cms-login-card">
      <div class="cms-login-logo">◆</div>
      <h1 class="display">Panel Admin</h1>
      <p class="sub">Masuk untuk mengelola seluruh konten website ARCHITEKTA.</p>
      <form id="loginForm">
        <div class="cms-field">
          <label for="email">Email</label>
          <input type="email" id="email" required autocomplete="username" placeholder="nama@email.com" autofocus>
        </div>
        <div class="cms-field">
          <label for="password">Kata sandi</label>
          <div class="cms-pass-wrap">
            <input type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
            <button type="button" class="cms-pass-toggle" id="passToggle" aria-label="Tampilkan kata sandi" title="Tampilkan/sembunyikan">👁</button>
          </div>
        </div>
        <button type="submit" id="loginBtn" class="cms-login-btn">Masuk</button>
        <div class="cms-login-err" id="loginErr"></div>
      </form>
      <a href="/" class="cms-login-back mono">← Kembali ke website</a>
    </div>
  </div>
  <script type="module" src="/src/js/cms/login.js"></script>
</body>
</html>
